<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Tải và Quản lý Ảnh (Firestore Only)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <nav class="bg-blue-600 p-4 text-white flex justify-center space-x-4 shadow-md">
        <button onclick="switchPage('user')" id="nav-user-btn" class="px-4 py-2 rounded bg-blue-800 font-bold">Trang Gửi Ảnh</button>
        <button onclick="switchPage('admin')" id="nav-admin-btn" class="px-4 py-2 rounded hover:bg-blue-700 font-bold">Trang Quản Lý (Admin)</button>
    </nav>

    <div class="max-w-4xl mx-auto p-4 mt-6">
        
        <div id="user-page" class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-4 text-gray-800 text-center">Tải Lên Ảnh Của Bạn</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-medium mb-1">Chọn tên của bạn:</label>
                    <select id="user-select" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500">
                        <option value="">-- Bấm vào đây để chọn tên --</option>
                        
                        <optgroup label="--- NAM ---">
                            <option value="Xuân Vương">Xuân Vương</option>
                            <option value="Tấn Thành">Tấn Thành</option>
                            <option value="Thanh Danh">Thanh Danh</option>
                            <option value="Hữu Luân">Hữu Luân</option>
                            <option value="Kiến Quốc">Kiến Quốc</option>
                            <option value="Hữu Nhân">Hữu Nhân</option>
                            <option value="Bảo Nguyên">Bảo Nguyên</option>
                            <option value="Đức Anh">Đức Anh</option>
                            <option value="Thái Hoàng">Thái Hoàng</option>
                            <option value="Gia Bảo">Gia Bảo</option>
                            <option value="Huỳnh Anh">Huỳnh Anh</option>
                            <option value="Phước Nguyễn">Phước Nguyễn</option>
                            <option value="Xuân Trường">Xuân Trường</option>
                            <option value="Đức Hiếu">Đức Hiếu</option>
                            <option value="Quân Hào">Quân Hào</option>
                            <option value="Tấn Phát">Tấn Phát</option>
                            <option value="Văn Khanh">Văn Khanh</option>
                            <option value="Thành Ngọc">Thành Ngọc</option>
                            <option value="Quang Vinh">Quang Vinh</option>
                            <option value="Hoàng Kim">Hoàng Kim</option>
                        </optgroup>

                        <optgroup label="--- NỮ ---">
                            <option value="Lan Anh Lê">Lan Anh Lê</option>
                            <option value="Ánh Dương">Ánh Dương</option>
                            <option value="Bích Ngọc">Bích Ngọc</option>
                            <option value="Phương Thuỳ">Phương Thuỳ</option>
                            <option value="Ngọc Na">Ngọc Na</option>
                            <option value="Ngọc Trâm">Ngọc Trâm</option>
                            <option value="Trường Bình">Trường Bình</option>
                            <option value="Hồng Lam">Hồng Lam</option>
                            <option value="Lan Anh Pham">Lan Anh Pham</option>
                            <option value="Cát Tường">Cát Tường</option>
                            <option value="Khả Ái">Khả Ái</option>
                            <option value="Minh Thư">Minh Thư</option>
                            <option value="Khánh Nhung">Khánh Nhung</option>
                            <option value="Thuỳ Trâm">Thuỳ Trâm</option>
                            <option value="Xuân Mai">Xuân Mai</option>
                            <option value="Cẩm Quyên">Cẩm Quyên</option>
                            <option value="Cẩm Tú">Cẩm Tú</option>
                        </optgroup>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-700 font-medium mb-1">Chọn ảnh muốn gửi:</label>
                    <input type="file" id="image-input" accept="image/*" class="w-full p-2 border rounded-md bg-gray-50">
                    <p class="text-xs text-gray-500 mt-1">* Mỗi người chỉ được up 1 lần duy nhất.</p>
                </div>

                <button onclick="uploadData()" id="upload-btn" class="w-full bg-blue-600 text-white p-3 rounded-md font-bold hover:bg-blue-700 transition">
                    Gửi Ảnh Ngay
                </button>
                
                <div id="status" class="text-center font-medium mt-2 hidden"></div>
            </div>
        </div>

        <div id="admin-auth-page" class="bg-white p-6 rounded-lg shadow-md max-w-md mx-auto hidden">
            <h2 class="text-xl font-bold mb-4 text-gray-800 text-center">Xác Thực Quản Trị Viên</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-medium mb-1">Nhập mật khẩu Admin:</label>
                    <input type="password" id="admin-password" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
                </div>
                <button onclick="checkAdminPassword()" class="w-full bg-gray-800 text-white p-2 rounded-md font-bold hover:bg-gray-900 transition">
                    Đăng Nhập
                </button>
            </div>
        </div>

        <div id="admin-page" class="bg-white p-6 rounded-lg shadow-md hidden">
            <div class="sm:flex sm:justify-between sm:items-center mb-6 border-b pb-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Danh Sách Ảnh Lớp 12A1</h2>
                    <p class="text-sm text-gray-500 mt-1">Tổng cộng: <span id="admin-count" class="font-bold text-blue-600">0</span> ảnh</p>
                </div>
                <div class="mt-3 sm:mt-0 space-x-1 space-y-2 sm:space-y-0">
                    <button onclick="loadAdminData()" class="bg-blue-500 text-white px-3 py-2 text-sm rounded font-medium hover:bg-blue-600">Tải lại 🔄</button>
                    <button onclick="downloadAllAsZip()" class="bg-amber-500 text-white px-3 py-2 text-sm rounded font-medium hover:bg-amber-600">Tải Hết File ZIP 📦</button>
                    <button onclick="logoutAdmin()" class="bg-red-500 text-white px-3 py-2 text-sm rounded font-medium hover:bg-red-600">Đăng xuất 🚪</button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full border-collapse border border-gray-200">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="border p-3 text-left">Họ và Tên</th>
                            <th class="border p-3 text-left">Thời gian gửi</th>
                            <th class="border p-3 text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDq2eIndzxvU8M6DohWEDbbFM8YbAyPpsE",
            authDomain: "anh12a1.firebaseapp.com",
            projectId: "anh12a1",
            storageBucket: "anh12a1.firebasestorage.app",
            messagingSenderId: "225328400024",
            appId: "1:225328400024:web:7deecfa809eb5d8d48b2ed",
            measurementId: "G-06CWQZ096H"
        };

        // Khởi tạo
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Mảng chứa dữ liệu tạm thời phục vụ tính năng ZIP ảnh
        let currentAdminData = [];

        // Hàm nén ảnh giảm dung lượng sang Base64
        function resizeAndConvertToBase64(file, maxWidth = 1000, quality = 0.7) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        // USER: Xử lý gửi ảnh kèm kiểm tra trùng lặp tên
        window.uploadData = async function() {
            const name = document.getElementById('user-select').value;
            const fileInput = document.getElementById('image-input');
            const file = fileInput.files[0];
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('upload-btn');

            if (!name) { alert("Vui lòng chọn tên của bạn!"); return; }
            if (!file) { alert("Vui lòng chọn 1 file ảnh!"); return; }

            try {
                btn.disabled = true;
                btn.innerText = "Đang kiểm tra dữ liệu...";
                statusDiv.classList.remove('hidden', 'text-red-500', 'text-green-500');
                statusDiv.classList.add('text-blue-500');
                statusDiv.innerText = "Đang kiểm tra xem bạn đã up ảnh trước đó chưa...";

                // Kiểm tra trùng lặp trên Firestore
                const q = query(collection(db, "uploads"), where("fullName", "==", name));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    statusDiv.className = "text-center font-medium mt-2 text-red-500";
                    statusDiv.innerText = `❌ Bạn ${name} đã up ảnh lên hệ thống rồi! Không cần up lần 2 nhé.`;
                    alert(`Hệ thống từ chối! Tài khoản tên [${name}] đã gửi ảnh rồi.`);
                    return;
                }

                statusDiv.innerText = "Đang tối ưu dung lượng ảnh...";
                const base64Image = await resizeAndConvertToBase64(file);

                statusDiv.innerText = "Đang lưu vào database...";
                await addDoc(collection(db, "uploads"), {
                    fullName: name,
                    imageUrl: base64Image,
                    createdAt: new Date().toLocaleString('vi-VN')
                });

                statusDiv.className = "text-center font-medium mt-2 text-green-600";
                statusDiv.innerText = `🎉 Bạn ${name} đã gửi ảnh thành công!`;
                fileInput.value = ""; 
                document.getElementById('user-select').value = "";
            } catch (error) {
                console.error(error);
                statusDiv.className = "text-center font-medium mt-2 text-red-500";
                statusDiv.innerText = "Có lỗi xảy ra, vui lòng thử lại!";
            } finally {
                btn.disabled = false;
                if(btn.innerText === "Đang lưu vào database..." || btn.innerText === "Đang xử lý...") {
                    btn.innerText = "Gửi Ảnh Ngay";
                }
            }
        }

        // ADMIN: Tải danh sách
        window.loadAdminData = async function() {
            const tableBody = document.getElementById('admin-table-body');
            tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4">Đang tải dữ liệu...</td></tr>';
            currentAdminData = []; 

            try {
                const querySnapshot = await getDocs(collection(db, "uploads"));
                tableBody.innerHTML = '';

                if(querySnapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4 text-gray-500">Chưa có ai gửi ảnh nào.</td></tr>';
                    document.getElementById('admin-count').innerText = "0";
                    return;
                }

                let count = 0;
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    if (!data.fullName) return;
                    count++;

                    // Lưu dữ liệu vào mảng tạm để phục vụ download ZIP
                    currentAdminData.push({
                        id: docSnap.id,
                        fullName: data.fullName,
                        imageUrl: data.imageUrl
                    });

                    const row = `
                        <tr id="row-${docSnap.id}" class="hover:bg-gray-50 border-b">
                            <td class="border p-3 font-medium text-gray-800">${data.fullName}</td>
                            <td class="border p-3 text-sm text-gray-500">${data.createdAt}</td>
                            <td class="border p-3 text-center space-x-1 space-y-1 sm:space-y-0">
                                <button onclick="openImageWindow('${data.imageUrl}')" class="bg-gray-500 text-white px-2 py-1 text-xs rounded hover:bg-gray-600">Xem</button>
                                <button onclick="downloadSingleImage('${data.imageUrl}', '${data.fullName}')" class="bg-blue-500 text-white px-2 py-1 text-xs rounded hover:bg-blue-600">Tải về</button>
                                <button onclick="deleteImage('${docSnap.id}', '${data.fullName}')" class="bg-red-500 text-white px-2 py-1 text-xs rounded hover:bg-red-600">Xóa 🗑️</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
                document.getElementById('admin-count').innerText = count;
            } catch (error) {
                console.error(error);
                tableBody.innerHTML = '<tr><td colspan="3" class="text-center p-4 text-red-500">Lỗi khi tải danh sách! Hãy check Rules Firestore.</td></tr>';
            }
        }

        // ADMIN: Xóa ảnh của thành viên
        window.deleteImage = async function(docId, name) {
            if (!confirm(`Bạn có chắc chắn muốn XÓA ảnh của bạn [${name}] không? Hành động này không thể hoàn tác!`)) {
                return;
            }
            try {
                await deleteDoc(doc(db, "uploads", docId));
                alert(`Đã xóa thành công ảnh của bạn: ${name}`);
                const targetRow = document.getElementById(`row-${docId}`);
                if(targetRow) targetRow.remove();
                
                // Cập nhật lại số lượng đếm hiển thị công khai
                let currentCount = parseInt(document.getElementById('admin-count').innerText);
                document.getElementById('admin-count').innerText = currentCount - 1;
                
                // Cập nhật lại mảng dữ liệu ZIP
                currentAdminData = currentAdminData.filter(item => item.id !== docId);
            } catch (error) {
                console.error(error);
                alert("Lỗi khi xóa dữ liệu!");
            }
        }

        // ADMIN: Download lẻ từng tấm ảnh trực tiếp
        window.downloadSingleImage = function(base64Data, fullName) {
            const link = document.createElement('a');
            link.href = base64Data;
            link.download = `12A1_${fullName.replace(/\s+/g, '_')}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ADMIN: Tự động gom tất cả ảnh hiện tại đóng gói thành file ảnh trong file nén .ZIP
        window.downloadAllAsZip = function() {
            if (currentAdminData.length === 0) {
                alert("Chưa có ảnh nào trong danh sách để tải về đóng gói ZIP cả!");
                return;
            }

            const zip = new JSZip();
            alert(`Hệ thống đang nén tự động ${currentAdminData.length} ảnh thành file ZIP, vui lòng đợi trong giây lát...`);

            currentAdminData.forEach((item) => {
                // Tách bỏ phần chuỗi header của base64 "data:image/jpeg;base64," để lấy mã hóa dữ liệu gốc file sạch
                const rawBase64 = item.imageUrl.split(',')[1];
                const fileName = `12A1_${item.fullName.replace(/\s+/g, '_')}.jpg`;
                zip.file(fileName, rawBase64, { base64: true });
            });

            zip.generateAsync({ type: "blob" }).then(function (content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "Anh_Ky_Yeu_Lop_12A1.zip";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        }

        // Mở ảnh tab mới
        window.openImageWindow = function(base64Data) {
            const newWindow = window.open();
            if (newWindow) {
                newWindow.document.write(`<img src="${base64Data}" style="max-width:100%; height:auto;" alt="User Image"/>`);
            } else {
                alert("Vui lòng cho phép mở cửa sổ bật lên (Pop-up) để xem ảnh.");
            }
        }
    </script>

    <script>
        let isAdminLoggedIn = false;

        function checkAdminPassword() {
            const passInput = document.getElementById('admin-password');
            if (passInput.value === 'admin@123') {
                isAdminLoggedIn = true;
                document.getElementById('admin-auth-page').classList.add('hidden');
                document.getElementById('admin-page').classList.remove('hidden');
                passInput.value = ''; 
                window.loadAdminData(); 
            } else {
                alert('Sai mật khẩu rồi bạn ơi! Vui lòng thử lại.');
            }
        }

        function logoutAdmin() {
            isAdminLoggedIn = false;
            switchPage('user');
        }

        function switchPage(page) {
            const userPage = document.getElementById('user-page');
            const adminAuthPage = document.getElementById('admin-auth-page');
            const adminPage = document.getElementById('admin-page');
            
            const btnUser = document.getElementById('nav-user-btn');
            const btnAdmin = document.getElementById('nav-admin-btn');

            if (page === 'user') {
                userPage.classList.remove('hidden');
                adminAuthPage.classList.add('hidden');
                adminPage.classList.add('hidden');
                
                btnUser.className = "px-4 py-2 rounded bg-blue-800 font-bold";
                btnAdmin.className = "px-4 py-2 rounded hover:bg-blue-700 font-bold";
            } else {
                userPage.classList.add('hidden');
                
                btnUser.className = "px-4 py-2 rounded hover:bg-blue-700 font-bold";
                btnAdmin.className = "px-4 py-2 rounded bg-blue-800 font-bold";

                if (isAdminLoggedIn) {
                    adminPage.remove('hidden');
                    adminPage.classList.remove('hidden');
                    window.loadAdminData();
                } else {
                    adminAuthPage.classList.remove('hidden');
                }
            }
        }
    </script>
</body>
</html>
